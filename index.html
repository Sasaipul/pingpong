<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PING PONG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --c:#00f5ff;
  --p:#ff006e;
  --y:#ffbe0b;
  --bg:#030609;
}

html,body{
  height:100%;min-height:100dvh;
  background:var(--bg);
  font-family:'Orbitron',monospace;
  color:var(--c);
  overflow:hidden;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px);
  background-size:36px 36px;
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.11) 2px,rgba(0,0,0,.11) 4px);
  pointer-events:none;z-index:1;
}

/* ===== SCREENS ===== */
.screen{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:22px;padding:24px;
  transition:opacity .3s;
}
.screen.hidden{opacity:0;pointer-events:none;}

/* ── MENU ── */
#menu-screen{background:rgba(3,6,9,.95);}

#menu-screen h1{
  font-size:clamp(2.2rem,9vw,3.8rem);
  font-weight:900;letter-spacing:.35em;
  text-shadow:0 0 15px var(--c),0 0 60px var(--c),0 0 120px rgba(0,245,255,.25);
  animation:flicker 5s infinite;
}
@keyframes flicker{0%,94%,100%{opacity:1}95%{opacity:.45}97%{opacity:1}98%{opacity:.25}99%{opacity:1}}

.menu-sub{
  font-family:'Share Tech Mono',monospace;
  font-size:.7rem;letter-spacing:.25em;color:rgba(255,255,255,.3);
}

.mode-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
.mode-card{
  width:148px;height:168px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.025);
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;
  transition:all .25s;
  position:relative;overflow:hidden;
}
.mode-card::before{content:'';position:absolute;inset:0;background:currentColor;opacity:0;transition:.25s;}
.mode-card:hover::before,.mode-card:active::before{opacity:.07;}
.mode-card svg{width:54px;height:54px;}
.mode-card-label{font-size:.68rem;letter-spacing:.2em;font-weight:700;text-transform:uppercase;}
.mode-card-sub{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:rgba(255,255,255,.3);}
#card-ai {color:var(--c);border-color:rgba(0,245,255,.28);}
#card-1v1{color:var(--p);border-color:rgba(255,0,110,.28);}
#card-ai:hover {box-shadow:0 0 24px rgba(0,245,255,.18),inset 0 0 24px rgba(0,245,255,.04);}
#card-1v1:hover{box-shadow:0 0 24px rgba(255,0,110,.18),inset 0 0 24px rgba(255,0,110,.04);}

.diff-row{display:flex;gap:8px;align-items:center;}
.diff-lbl{font-size:.55rem;letter-spacing:.2em;color:rgba(255,255,255,.28);margin-right:4px;}
.diff-btn{
  font-family:'Share Tech Mono',monospace;font-size:.62rem;
  padding:7px 15px;border:1px solid rgba(255,255,255,.18);
  background:transparent;color:rgba(255,255,255,.32);
  cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;
}
.diff-btn.active{border-color:var(--y);color:var(--y);box-shadow:0 0 8px rgba(255,190,11,.28);background:rgba(255,190,11,.05);}

/* ===== GAME SCREEN ===== */
#game-screen{
  flex-direction:column;justify-content:center;
  background:transparent;z-index:10;gap:0;
}

#game-wrap{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;
  width:100%;max-width:380px;
}

/* HUD bars */
.hud{
  width:100%;display:flex;
  align-items:center;justify-content:space-between;
  padding:7px 14px;
  background:rgba(3,6,9,.75);
  border:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
}
.hud-name{font-size:.52rem;letter-spacing:.22em;color:rgba(255,255,255,.3);margin-bottom:1px;}
.hud-score{font-family:'Share Tech Mono',monospace;font-size:2rem;font-weight:700;line-height:1;text-shadow:0 0 16px currentColor;}
.hud-top .hud-score{color:var(--p);}
.hud-bot .hud-score{color:var(--c);}
.hud-right{text-align:right;}
.hud-badge{font-family:'Share Tech Mono',monospace;font-size:.52rem;color:rgba(255,255,255,.22);letter-spacing:.1em;}

/* canvas */
#canvas-wrap{
  position:relative;
  width:100%;
  border-left:1px solid rgba(0,245,255,.18);
  border-right:1px solid rgba(0,245,255,.18);
  overflow:hidden;
}
canvas{display:block;width:100%;height:auto;}

/* corner deco */
#canvas-wrap::before,#canvas-wrap::after{
  content:'';position:absolute;width:14px;height:14px;
  border-color:rgba(0,245,255,.45);border-style:solid;z-index:2;
}
#canvas-wrap::before{top:4px;left:4px;border-width:2px 0 0 2px;}
#canvas-wrap::after{bottom:4px;right:4px;border-width:0 2px 2px 0;}

/* touch zones */
#tz-top,#tz-bot{
  position:absolute;width:100%;height:50%;left:0;
  pointer-events:none;
  transition:background .1s;
}
#tz-top{top:0;}
#tz-bot{bottom:0;}
#tz-top.flash{background:radial-gradient(ellipse at 50% 30%,rgba(255,0,110,.08) 0%,transparent 70%);}
#tz-bot.flash{background:radial-gradient(ellipse at 50% 70%,rgba(0,245,255,.08) 0%,transparent 70%);}

/* d-pad (mobile sides) */
#dpad-left,#dpad-right{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:6px;z-index:5;
}
#dpad-left{left:-50px;}
#dpad-right{right:-50px;}
.dpb{
  width:42px;height:42px;border:1px solid;
  background:rgba(3,6,9,.85);
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;cursor:pointer;border-radius:4px;transition:background .1s;touch-action:none;
}
.dpb:active,.dpb.pressed{background:rgba(255,255,255,.1);}
#dpad-left .dpb{color:var(--c);border-color:rgba(0,245,255,.28);}
#dpad-right .dpb{color:var(--p);border-color:rgba(255,0,110,.28);}

/* overlay */
#overlay{
  position:absolute;inset:0;
  background:rgba(3,6,9,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:15;transition:opacity .3s;
}
#overlay.hidden{opacity:0;pointer-events:none;}
#ov-title{font-size:clamp(1.1rem,3.5vw,1.5rem);font-weight:900;letter-spacing:.25em;text-shadow:0 0 20px currentColor;}
#ov-sub{
  font-family:'Share Tech Mono',monospace;
  font-size:.62rem;color:rgba(255,255,255,.38);
  letter-spacing:.14em;text-align:center;line-height:1.75;max-width:220px;
}
.ov-btn{
  font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;
  letter-spacing:.2em;padding:10px 26px;
  border:1px solid rgba(0,245,255,.5);
  background:transparent;cursor:pointer;color:var(--c);
  transition:all .2s;text-transform:uppercase;
}
.ov-btn:hover{background:rgba(0,245,255,.08);box-shadow:0 0 16px rgba(0,245,255,.18);}
@keyframes wpulse{0%,100%{text-shadow:0 0 10px currentColor,0 0 30px currentColor;}50%{text-shadow:0 0 30px currentColor,0 0 80px currentColor,0 0 140px currentColor;}}
.wf{animation:wpulse .5s infinite;}

/* bottom bar */
#bottom-bar{
  display:flex;gap:8px;padding:10px 8px 6px;justify-content:center;flex-wrap:wrap;
}
.btn{
  font-family:'Orbitron',monospace;font-size:.56rem;font-weight:700;
  letter-spacing:.14em;padding:7px 14px;
  border:1px solid currentColor;background:transparent;
  cursor:pointer;text-transform:uppercase;transition:all .2s;position:relative;overflow:hidden;
}
.btn::before{content:'';position:absolute;inset:0;background:currentColor;opacity:0;transition:.2s;}
.btn:hover::before,.btn:active::before{opacity:.1;}
.btn-m{color:rgba(255,255,255,.28);border-color:rgba(255,255,255,.14);}
.btn-p{color:var(--y);border-color:rgba(255,190,11,.38);}

@media(min-width:580px){#dpad-left,#dpad-right{display:none;}}
@media(max-width:400px){#dpad-left{left:-44px;}#dpad-right{right:-44px;}}
</style>
</head>
<body>

<!-- ═══ MENU ═══ -->
<div class="screen" id="menu-screen">
  <h1>PING PONG</h1>
  <div class="menu-sub">PILIH MODE PERMAINAN</div>

  <div class="mode-cards">
    <div class="mode-card" id="card-ai">
      <svg viewBox="0 0 54 54" fill="none">
        <rect x="9" y="7" width="36" height="40" rx="4" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="20" cy="23" r="4.5" fill="currentColor" opacity=".65"/>
        <circle cx="34" cy="23" r="4.5" fill="currentColor" opacity=".65"/>
        <path d="M17 36 Q27 42 37 36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="21" y1="7" x2="21" y2="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="33" y1="7" x2="33" y2="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="mode-card-label">VS AI</div>
      <div class="mode-card-sub">1 Pemain</div>
    </div>
    <div class="mode-card" id="card-1v1">
      <svg viewBox="0 0 54 54" fill="none">
        <circle cx="15" cy="17" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M4 40 C4 31 26 31 26 40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="39" cy="17" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M28 40 C28 31 50 31 50 40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="mode-card-label">1 VS 1</div>
      <div class="mode-card-sub">2 Pemain Lokal</div>
    </div>
  </div>

  <div class="diff-row">
    <span class="diff-lbl">LEVEL:</span>
    <button class="diff-btn" data-d="easy">EASY</button>
    <button class="diff-btn active" data-d="medium">MEDIUM</button>
    <button class="diff-btn" data-d="hard">HARD</button>
  </div>
</div>

<!-- ═══ GAME ═══ -->
<div class="screen hidden" id="game-screen">
  <div id="game-wrap">

    <!-- P2 / AI HUD (top) -->
    <div class="hud hud-top">
      <div>
        <div class="hud-name" id="p2-name">AI</div>
        <div class="hud-score" id="s2">0</div>
      </div>
      <div style="text-align:center">
        <div class="hud-badge" id="hud-diff">MED</div>
      </div>
      <div class="hud-right">
        <div class="hud-name">TARGET</div>
        <div class="hud-badge">11</div>
      </div>
    </div>

    <!-- CANVAS -->
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="tz-top"></div>
      <div id="tz-bot"></div>

      <!-- OVERLAY -->
      <div id="overlay">
        <div id="ov-title" style="color:var(--c)">SIAP?</div>
        <div id="ov-sub">Tap layar atau tekan MULAI</div>
        <button class="ov-btn" id="ov-btn">▶ MULAI</button>
      </div>

      <!-- D-pads (mobile) -->
      <div id="dpad-left">
        <button class="dpb" id="dp1u">▲</button>
        <button class="dpb" id="dp1d">▼</button>
      </div>
      <div id="dpad-right">
        <button class="dpb" id="dp2u">▲</button>
        <button class="dpb" id="dp2d">▼</button>
      </div>
    </div>

    <!-- P1 HUD (bottom) -->
    <div class="hud hud-bot">
      <div>
        <div class="hud-name">PLAYER 1</div>
        <div class="hud-score" id="s1">0</div>
      </div>
      <div style="text-align:center">
        <div class="hud-badge" id="hud-mode">VS AI</div>
      </div>
      <div class="hud-right">
        <div class="hud-name">KONTROL</div>
        <div class="hud-badge">A / D · GESER</div>
      </div>
    </div>

  </div>

  <div id="bottom-bar">
    <button class="btn btn-m" id="soundBtn">🔊 SUARA</button>
    <button class="btn btn-p" id="pauseBtn">⏸ PAUSE</button>
    <button class="btn btn-m" id="menuBtn">☰ MENU</button>
  </div>
</div>

<script>
// ══ AUDIO ══
const AC=new(window.AudioContext||window.webkitAudioContext)();
let sOn=true;
function unlk(){if(AC.state==='suspended')AC.resume();}
document.addEventListener('touchstart',unlk,{once:true});
document.addEventListener('mousedown',unlk,{once:true});

function beep(f,d,v=0.3,t='square',dc=0.8){
  if(!sOn||AC.state==='suspended')return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.setValueAtTime(f,AC.currentTime);
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d*dc);
    o.start(AC.currentTime);o.stop(AC.currentTime+d);
  }catch(e){}
}
const SFX={
  hit: ()=>beep(480,.055,.28,'square',.6),
  wall:()=>beep(200,.04,.18,'square',.55),
  pt:  ()=>{beep(650,.08,.38,'sine',.9);setTimeout(()=>beep(950,.14,.38,'sine',.88),85);},
  win: ()=>{[520,740,960,1280].forEach((f,i)=>setTimeout(()=>beep(f,.18,.45,'sine',.85),i*105));},
  lose:()=>{[380,280,180].forEach((f,i)=>setTimeout(()=>beep(f,.18,.38,'sawtooth',.8),i*95));},
  ui:  ()=>beep(680,.06,.18,'sine',.7),
  powerup: ()=>{beep(800,.06,.3,'sine',.7);setTimeout(()=>beep(1100,.1,.35,'sine',.8),70);setTimeout(()=>beep(1500,.14,.3,'sine',.85),150);},
  powerend:()=>{beep(600,.06,.25,'sine',.7);setTimeout(()=>beep(350,.12,.25,'sawtooth',.8),70);},
};

// ══ CANVAS ══
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const LW=320,LH=540;
canvas.width=LW;canvas.height=LH;

const DIFF={
  easy:  {bs:4.2,as:2.6,err:48},
  medium:{bs:5.8,as:4.0,err:24},
  hard:  {bs:8.0,as:6.2,err:5},
};
let cd='medium';
let twoP=false;
const WIN=11;
const PW=68,PH=12,BR=7.5,PSPD=7;

// paddles: p1=bottom (cyan), p2=top (pink)
let p1={x:LW/2-PW/2,y:LH-30-PH};
let p2={x:LW/2-PW/2,y:30};
let ball={x:0,y:0,vx:0,vy:0};
let score=[0,0];
let parts=[];
let trail=[];
let state='idle';

// ballOwner: 0=P1(bottom) holds it, 1=P2(top) holds it, -1=in play
let ballOwner=-1;
let isFirstServe=true;

function attachBall(owner){
  ballOwner=owner;
  ball.vx=0;ball.vy=0;trail=[];
  snapBallToOwner();
}

function snapBallToOwner(){
  if(ballOwner===0){ball.x=p1.x+pwOf(0)/2;ball.y=p1.y-BR-2;}
  else if(ballOwner===1){ball.x=p2.x+pwOf(1)/2;ball.y=p2.y+PH+BR+2;}
}

function launchBall(){
  if(ballOwner===-1)return;
  const d=DIFF[cd];
  const a=(Math.random()*.5-.25);
  if(ballOwner===0){ball.vy=-d.bs*Math.cos(a);ball.vx=d.bs*Math.sin(a)*(Math.random()>.5?1:-1);}
  else             {ball.vy= d.bs*Math.cos(a);ball.vx=d.bs*Math.sin(a)*(Math.random()>.5?1:-1);}
  ballOwner=-1;
  SFX.ui();
}

function rBall(loser){
  // loser = side that just conceded (0=P1 bottom, 1=P2 top)
  attachBall(loser);
}

function rGame(){
  score=[0,0];
  p1.x=LW/2-PW/2;p2.x=LW/2-PW/2;
  ballOwner=-1;isFirstServe=true;
  pu=null;puEffect=null;puSpawnTimer=0;ballLastHit=-1;
  puNextSpawn=PU_SPAWN_INTERVAL_MIN+Math.random()*(PU_SPAWN_INTERVAL_MAX-PU_SPAWN_INTERVAL_MIN);
  updHUD();
}

// ══ INPUT ══
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','Enter'].includes(e.key)){
    unlk();
    if(state==='idle'||state==='over') startGame();
    e.preventDefault();
  }
  if(['ArrowLeft','ArrowRight','a','d','A','D'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.key]=false);

function holdBtn(id,set){
  const el=document.getElementById(id);if(!el)return;
  const dn=()=>set.forEach(k=>keys[k]=true);
  const up=()=>{set.forEach(k=>keys[k]=false);el.classList.remove('pressed');};
  el.addEventListener('touchstart',e=>{e.preventDefault();unlk();dn();el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();up();},{passive:false});
  el.addEventListener('mousedown',()=>{dn();el.classList.add('pressed');});
  el.addEventListener('mouseup',up);
  el.addEventListener('mouseleave',up);
}
holdBtn('dp1u',['a','A']);
holdBtn('dp1d',['d','D']);
holdBtn('dp2u',['ArrowLeft']);
holdBtn('dp2d',['ArrowRight']);

// swipe/drag on canvas
let tP1=null,tP2=null;
const cwrap=document.getElementById('canvas-wrap');
const tzT=document.getElementById('tz-top');
const tzB=document.getElementById('tz-bot');

function flashZone(el){
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),120);
}

cwrap.addEventListener('touchstart',e=>{
  e.preventDefault();unlk();
  if(state==='idle'||state==='over'){startGame();return;}
  Array.from(e.changedTouches).forEach(t=>{
    const rect=cwrap.getBoundingClientRect();
    const ny=(t.clientY-rect.top)/rect.height;
    if(ny>0.5){
      if(!tP1)tP1={id:t.identifier,px:t.clientX};
      // P1 taps bottom half to launch if they hold ball
      if(ballOwner===0) launchBall();
    }else{
      if(!tP2)tP2={id:t.identifier,px:t.clientX};
      // P2 taps top half to launch if they hold ball
      if(ballOwner===1) launchBall();
    }
  });
},{passive:false});

cwrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  const scale=LW/cwrap.offsetWidth;
  Array.from(e.changedTouches).forEach(t=>{
    if(tP1&&t.identifier===tP1.id){
      p1.x=Math.max(0,Math.min(LW-PW,p1.x+(t.clientX-tP1.px)*scale));
      tP1.px=t.clientX;flashZone(tzB);
    }
    if(tP2&&t.identifier===tP2.id){
      p2.x=Math.max(0,Math.min(LW-PW,p2.x+(t.clientX-tP2.px)*scale));
      tP2.px=t.clientX;flashZone(tzT);
    }
  });
},{passive:false});

cwrap.addEventListener('touchend',e=>{
  Array.from(e.changedTouches).forEach(t=>{
    if(tP1&&t.identifier===tP1.id)tP1=null;
    if(tP2&&t.identifier===tP2.id)tP2=null;
  });
},{passive:false});

// ══ PARTICLES ══
function spawnP(x,y,col,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3.5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,dc:.04+Math.random()*.04,sz:2+Math.random()*3,col});
  }
}
function updP(){parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=p.dc;return p.life>0;});}
function drawP(){
  parts.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life*.8;
    ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

// ══ AI ══
function aiMove(){
  const d=DIFF[cd];
  const target=ball.x-PW/2+(Math.random()-.5)*d.err;
  const diff=target-p2.x;
  p2.x+=Math.min(Math.abs(diff),d.as)*Math.sign(diff);
  p2.x=Math.max(0,Math.min(LW-PW,p2.x));
}

// ══ UPDATE ══
function updPads(){
  let p1moved=false,p2moved=false;
  if(keys['a']||keys['A']){p1.x-=PSPD;p1moved=true;}
  if(keys['d']||keys['D']){p1.x+=PSPD;p1moved=true;}
  p1.x=Math.max(0,Math.min(LW-PW,p1.x));
  if(twoP){
    if(keys['ArrowLeft']) {p2.x-=PSPD;p2moved=true;}
    if(keys['ArrowRight']){p2.x+=PSPD;p2moved=true;}
    p2.x=Math.max(0,Math.min(LW-PW,p2.x));
  }else{
    if(ballOwner===1){
      // AI serves: auto-launch after a short delay
      // handled via aiServeTimer
    }
    aiMove();
  }
  // snap held ball to owner's paddle
  if(ballOwner!==-1) snapBallToOwner();
  // human launches by moving
  if(ballOwner===0&&p1moved) launchBall();
  if(ballOwner===1&&twoP&&p2moved) launchBall();
}

let aiServeTimer=0;
let ballLastHit=-1; // 0=P1, 1=P2, -1=nobody yet

// ══ POWER-UPS ══
const PU_DURATION = 300; // frames (~5s at 60fps)
const PU_SPAWN_INTERVAL_MIN = 420; // ~7s
const PU_SPAWN_INTERVAL_MAX = 720; // ~12s
const PU_R = 14;
// power-up type (target assigned dynamically from ballLastHit)
const PU_BASE = {id:'big', label:'BIG'};

let pu = null;        // active pickup on field: {x,y,type,pulse}
let puEffect = null;  // active effect: {type, timer, target}
let puSpawnTimer = 0;
let puNextSpawn = 480;

// effective paddle widths
function pwOf(player){ // 0=p1,1=p2
  if(puEffect && puEffect.target===player && puEffect.timer>0) return PW*2;
  return PW;
}

function spawnPowerup(){
  if(pu!==null) return; // only 1 at a time
  const margin=40;
  const x = margin + Math.random()*(LW-margin*2);
  const y = LH*0.3 + Math.random()*(LH*0.4);
  // target/color unknown until collected — shown as neutral until then
  pu = {x, y, target:-1, col:'#ffbe0b', pulse:0};
}

function collectPowerup(){
  if(!pu) return;
  const dx=ball.x-pu.x, dy=ball.y-pu.y;
  if(Math.hypot(dx,dy) < BR+PU_R){
    // whoever last hit the ball gets the power-up
    const winner = ballLastHit; // 0=P1, 1=P2, -1=nobody (ignore)
    if(winner===-1){ pu=null; return; } // no owner yet, remove pickup
    const col = winner===0?'#00f5ff':'#ff006e';
    puEffect = {timer: PU_DURATION, target: winner, col};
    spawnP(pu.x, pu.y, col, 22);
    SFX.powerup();
    pu = null;
    puSpawnTimer = 0;
    puNextSpawn = PU_SPAWN_INTERVAL_MIN + Math.random()*(PU_SPAWN_INTERVAL_MAX-PU_SPAWN_INTERVAL_MIN);
  }
}

function updPowerup(){
  if(state!=='playing') return;
  // tick effect
  if(puEffect){
    puEffect.timer--;
    if(puEffect.timer<=0){puEffect=null;SFX.powerend();}
  }
  // spawn timer
  if(!pu && ballOwner===-1){
    puSpawnTimer++;
    if(puSpawnTimer>=puNextSpawn){ spawnPowerup(); }
  }
  if(pu){
    pu.pulse = (pu.pulse||0)+0.08;
    // color the pickup to show who would get it (last hitter)
    if(ballLastHit===0) pu.col='#00f5ff';
    else if(ballLastHit===1) pu.col='#ff006e';
    else pu.col='#ffbe0b'; // nobody hit yet
    collectPowerup();
  }
}

function drawPowerup(){
  if(!pu) return;
  const {x,y,col,pulse} = pu;
  const glow = 12+Math.sin(pulse)*6;
  const scale = 1+Math.sin(pulse)*0.08;
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  // outer ring
  ctx.beginPath();ctx.arc(0,0,PU_R,0,Math.PI*2);
  ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=glow;ctx.lineWidth=2;
  ctx.stroke();
  // inner fill
  ctx.beginPath();ctx.arc(0,0,PU_R-4,0,Math.PI*2);
  ctx.fillStyle=col;ctx.globalAlpha=0.18;ctx.fill();
  ctx.globalAlpha=1;
  // expand arrows
  ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(-8,0);ctx.moveTo(-8,0);ctx.lineTo(-6,-2.5);ctx.moveTo(-8,0);ctx.lineTo(-6,2.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(4,0);ctx.lineTo(8,0);ctx.moveTo(8,0);ctx.lineTo(6,-2.5);ctx.moveTo(8,0);ctx.lineTo(6,2.5);ctx.stroke();
  // label
  ctx.font='bold 6px monospace';ctx.textAlign='center';ctx.fillStyle=col;ctx.globalAlpha=0.9;ctx.shadowBlur=6;
  ctx.fillText('BIG',0,5);
  ctx.restore();
}

function drawPuEffect(){
  if(!puEffect||puEffect.timer<=0) return;
  const frac = puEffect.timer/PU_DURATION;
  if(frac<0.25 && Math.sin(Date.now()*0.02)<0) return;
  const col = puEffect.col||(puEffect.target===0?'#00f5ff':'#ff006e');
  ctx.save();
  ctx.font='bold 7px monospace';ctx.textAlign='center';
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;ctx.globalAlpha=0.85;
  const secs = Math.ceil(puEffect.timer/60);
  const who = puEffect.target===0?'P1':'P2';
  if(puEffect.target===0){
    ctx.fillText('BIG PADDLE ×2 ['+who+']  '+secs+'s', LW/2, p1.y-24);
  } else {
    ctx.fillText('BIG PADDLE ×2 ['+who+']  '+secs+'s', LW/2, p2.y+PH+20);
  }
  ctx.restore();
}

function updBall(){
  // if ball is held by someone, don't move it
  if(ballOwner!==-1){
    // AI auto-serve after delay
    if(ballOwner===1&&!twoP){
      aiServeTimer++;
      if(aiServeTimer>90){aiServeTimer=0;launchBall();}
    }
    return;
  }

  trail.unshift({x:ball.x,y:ball.y});
  if(trail.length>15)trail.pop();
  ball.x+=ball.vx;ball.y+=ball.vy;

  // walls
  if(ball.x-BR<=0){ball.x=BR;ball.vx*=-1;SFX.wall();spawnP(ball.x,ball.y,'#fff',5);}
  if(ball.x+BR>=LW){ball.x=LW-BR;ball.vx*=-1;SFX.wall();spawnP(ball.x,ball.y,'#fff',5);}

  // hit P1 bottom paddle
  {const pw1=pwOf(0);
  if(ball.vy>0&&ball.y+BR>=p1.y&&ball.y+BR<=p1.y+PH+6&&ball.x>=p1.x-4&&ball.x<=p1.x+pw1+4){
    ball.y=p1.y-BR;
    const h=(ball.x-p1.x)/pw1-.5,sp=Math.hypot(ball.vx,ball.vy)*1.05,ang=h*1.3;
    ball.vy=-Math.abs(sp*Math.cos(ang));ball.vx=sp*Math.sin(ang);
    SFX.hit();spawnP(ball.x,ball.y,'#00f5ff',14);ballLastHit=0;
  }}
  // hit P2 top paddle
  {const pw2=pwOf(1);
  if(ball.vy<0&&ball.y-BR<=p2.y+PH&&ball.y-BR>=p2.y-6&&ball.x>=p2.x-4&&ball.x<=p2.x+pw2+4){
    ball.y=p2.y+PH+BR;
    const h=(ball.x-p2.x)/pw2-.5,sp=Math.hypot(ball.vx,ball.vy)*1.05,ang=h*1.3;
    ball.vy=Math.abs(sp*Math.cos(ang));ball.vx=sp*Math.sin(ang);
    SFX.hit();spawnP(ball.x,ball.y,'#ff006e',14);ballLastHit=1;
  }}

  // scores — loser of the point gets to serve next
  if(ball.y<-BR*2){
    score[0]++;updHUD();SFX.pt();spawnP(ball.x,2,'#00f5ff',22);
    if(score[0]>=WIN){endGame(0);return;}
    aiServeTimer=0;pu=null;puSpawnTimer=0;puEffect=null;rBall(1); // P2 conceded → P2 serves
  }
  if(ball.y>LH+BR*2){
    score[1]++;updHUD();SFX.pt();spawnP(ball.x,LH,'#ff006e',22);
    if(score[1]>=WIN){endGame(1);return;}
    aiServeTimer=0;pu=null;puSpawnTimer=0;puEffect=null;rBall(0); // P1 conceded → P1 serves
  }
}

function updHUD(){
  document.getElementById('s1').textContent=score[0];
  document.getElementById('s2').textContent=score[1];
}

// ══ DRAW ══
function drawPad(x,y,col,pw){
  pw = pw||PW;
  ctx.save();
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=22;
  ctx.fillRect(x,y,pw,PH);
  ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.22)';
  ctx.fillRect(x+4,y+2,pw-8,3);
  // glow edge if enlarged
  if(pw>PW){
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.shadowColor=col;ctx.shadowBlur=14;ctx.globalAlpha=0.5;
    ctx.strokeRect(x,y,pw,PH);
  }
  ctx.restore();
}

function draw(){
  ctx.fillStyle='#030609';ctx.fillRect(0,0,LW,LH);
  // center line
  ctx.save();ctx.setLineDash([6,10]);ctx.strokeStyle='rgba(255,255,255,.065)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,LH/2);ctx.lineTo(LW,LH/2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  // center circle
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(LW/2,LH/2,34,0,Math.PI*2);ctx.stroke();ctx.restore();
  // trail
  trail.forEach((pt,i)=>{
    const a=(1-i/trail.length)*.32,r=BR*(1-i/trail.length)*.72;
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.shadowColor='#00f5ff';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  // ball
  ctx.save();
  ctx.fillStyle='#fff';ctx.shadowColor='#00f5ff';ctx.shadowBlur=30;
  ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='rgba(180,255,255,.9)';
  ctx.beginPath();ctx.arc(ball.x-1.5,ball.y-2,BR*.36,0,Math.PI*2);ctx.fill();
  ctx.restore();
  drawPad(p1.x,p1.y,'#00f5ff',pwOf(0));
  drawPad(p2.x,p2.y,'#ff006e',pwOf(1));
  drawPowerup();
  drawPuEffect();
  drawP();

  // serve indicator
  if(ballOwner!==-1){
    const t=Date.now();
    const blink=Math.sin(t*0.008)>0;
    if(blink){
      ctx.save();
      ctx.font='bold 9px monospace';
      ctx.textAlign='center';
      ctx.letterSpacing='2px';
      const col=ballOwner===0?'#00f5ff':'#ff006e';
      ctx.fillStyle=col;
      ctx.shadowColor=col;ctx.shadowBlur=10;
      ctx.globalAlpha=0.9;
      if(ballOwner===0){
        ctx.fillText('GERAK / TAP UNTUK SERVIS',LW/2,p1.y-BR-10);
      }else{
        ctx.fillText('GERAK / TAP UNTUK SERVIS',LW/2,p2.y+PH+BR+18);
      }
      ctx.restore();
    }
  }
}

// ══ GAME FLOW ══
function showOV(title,sub,col,btn=true){
  const ov=document.getElementById('overlay');
  const ot=document.getElementById('ov-title');
  const os=document.getElementById('ov-sub');
  const ob=document.getElementById('ov-btn');
  ot.textContent=title;ot.style.color=col;ot.className=btn?'wf':'';
  os.textContent=sub;
  ob.style.display=btn?'':'none';
  ov.classList.remove('hidden');
}
function hideOV(){document.getElementById('overlay').classList.add('hidden');}

let raf=null,lastT=0;
function loop(ts){
  if(state!=='playing')return;
  updPads();updBall();updPowerup();updP();draw();
  raf=requestAnimationFrame(loop);
}

function startGame(){
  hideOV();state='playing';
  resetPauseBtn();
  rGame();
  // first serve: random owner
  isFirstServe=false;
  attachBall(Math.random()>.5?0:1);
  aiServeTimer=0;
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

function endGame(w){
  state='over';cancelAnimationFrame(raf);
  const ns=['PLAYER 1',twoP?'PLAYER 2':'AI'];
  const cs=['#00f5ff','#ff006e'];
  w===0?SFX.win():SFX.lose();
  draw();
  showOV(ns[w]+' MENANG!','Tap MULAI untuk main lagi',cs[w]);
}

function goMenu(){
  state='idle';cancelAnimationFrame(raf);SFX.ui();
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
}

function resetPauseBtn(){
  const pb=document.getElementById('pauseBtn');
  pb.textContent='⏸ PAUSE';
}

// ══ BUTTONS ══
document.getElementById('ov-btn').addEventListener('click',()=>{SFX.ui();startGame();});

document.getElementById('pauseBtn').addEventListener('click',()=>{
  SFX.ui();
  if(state==='playing'){
    state='paused';cancelAnimationFrame(raf);
    showOV('PAUSED','Tekan lanjut untuk kembali','#ffbe0b',true);
    document.getElementById('ov-btn').textContent='▶ LANJUT';
    document.getElementById('pauseBtn').textContent='▶ LANJUT';
    const resume=()=>{
      SFX.ui();hideOV();
      state='playing';
      resetPauseBtn();
      document.getElementById('ov-btn').textContent='▶ MULAI';
      document.getElementById('ov-btn').onclick=()=>{SFX.ui();startGame();};
      document.getElementById('pauseBtn').onclick=pauseHandler;
      raf=requestAnimationFrame(loop);
    };
    document.getElementById('ov-btn').onclick=resume;
    document.getElementById('pauseBtn').onclick=resume;
  }
});
function pauseHandler(){document.getElementById('pauseBtn').click();}

document.getElementById('menuBtn').addEventListener('click',goMenu);
document.getElementById('soundBtn').addEventListener('click',()=>{
  sOn=!sOn;
  document.getElementById('soundBtn').textContent=sOn?'🔊 SUARA':'🔇 MUTE';
  if(sOn)SFX.ui();
});

// diff buttons
document.querySelectorAll('.diff-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');cd=b.dataset.d;
    document.getElementById('hud-diff').textContent=b.dataset.d.toUpperCase().substring(0,4);
    SFX.ui();
  });
});

// mode cards
function launchMode(isTwoP){
  twoP=isTwoP;SFX.ui();
  document.getElementById('p2-name').textContent=twoP?'PLAYER 2':'AI';
  document.getElementById('hud-mode').textContent=twoP?'1 VS 1':'VS AI';
  document.getElementById('game-screen').classList.remove('hidden');
  document.getElementById('menu-screen').classList.add('hidden');
  resetPauseBtn();
  state='idle';rGame();draw();
  if(twoP){
    showOV('1 VS 1','P1: Geser bawah / A-D\nP2: Geser atas / ←→','#ff006e');
  }else{
    showOV('VS AI','Geser layar bawah atau tekan A / D','#00f5ff');
  }
}
document.getElementById('card-ai') .addEventListener('click',()=>launchMode(false));
document.getElementById('card-1v1').addEventListener('click',()=>launchMode(true));

// initial draw
rBall();draw();
</script>
